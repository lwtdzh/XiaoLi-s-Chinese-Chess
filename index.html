<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国象棋在线</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <!-- Lobby Screen -->
        <div id="lobby" class="screen">
            <h1>🀄 中国象棋</h1>
            <div class="lobby-container">
                <div class="room-section">
                    <h2>创建房间</h2>
                    <input type="text" id="roomName" placeholder="房间名称" maxlength="20">
                    <button id="createRoomBtn">创建房间</button>
                </div>
                <div class="room-section">
                    <h2>加入房间</h2>
                    <input type="text" id="joinRoomId" placeholder="房间 ID 或名称">
                    <button id="joinRoomBtn">加入房间</button>
                </div>
                <div id="lobbyMessage" class="lobby-message hidden"></div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game" class="screen hidden">
            <div class="game-header">
                <div class="player-info">
                    <span id="opponentName">等待对手加入...</span>
                    <span class="color-indicator black"></span>
                </div>
                <div class="game-status">
                    <span id="turnIndicator">你的回合</span>
                    <div class="room-id-box hidden">
                        <small>房间 ID:</small>
                        <code id="roomIdDisplay"></code>
                    </div>
                    <button id="leaveRoomBtn">离开</button>
                </div>
                <div class="player-info">
                    <span id="myName">我</span>
                    <span class="color-indicator red"></span>
                </div>
            </div>
            <div class="board-container">
                <div id="chessBoard"></div>
            </div>
            <div id="gameMessage" class="game-message hidden"></div>
        </div>
    </div>

    <script type="module" defer src="/game.js"></script>
</body>
</html>
