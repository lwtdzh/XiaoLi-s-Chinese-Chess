<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <meta name="description" content="在线中国象棋游戏 - 支持实时对战，随时随地享受经典棋艺">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Chinese Chess Online - 在线中国象棋</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Critical CSS for initial load */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .loading-screen {
            text-align: center;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .loading-screen h1 {
            font-size: 2em;
            margin-bottom: 20px;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Skip link for accessibility */
        .skip-link {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            z-index: 1000;
            transition: top 0.3s;
        }
        .skip-link:focus {
            top: 10px;
        }
        /* Visually hidden but accessible to screen readers */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <a href="#game" class="skip-link">跳转到游戏棋盘</a>
    <div id="app" role="application" aria-label="中国象棋游戏">
        <!-- Lobby Screen -->
        <div id="lobby" class="screen" role="region" aria-label="游戏大厅">
            <h1>🀄 中国象棋</h1>
            <div class="lobby-container">
                <div class="room-section">
                    <h2>创建房间</h2>
                    <label for="roomName" class="visually-hidden">房间名称</label>
                    <input type="text" id="roomName" placeholder="输入房间名称" maxlength="100" aria-describedby="roomNameHelp" autocomplete="off">
                    <span id="roomNameHelp" class="visually-hidden">输入您想创建的房间名称</span>
                    <button id="createRoomBtn" aria-label="创建新房间" type="button">创建房间</button>
                </div>
                <div class="room-section">
                    <h2>加入房间</h2>
                    <label for="joinRoomId" class="visually-hidden">房间 ID 或名称</label>
                    <input type="text" id="joinRoomId" placeholder="输入房间 ID 或名称" aria-describedby="joinRoomHelp" autocomplete="off">
                    <span id="joinRoomHelp" class="visually-hidden">输入您想加入的房间ID或名称</span>
                    <button id="joinRoomBtn" aria-label="加入指定房间" type="button">加入房间</button>
                </div>
                <div id="lobbyMessage" class="lobby-message hidden" role="alert" aria-live="polite"></div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game" class="screen hidden" role="region" aria-label="游戏棋盘" tabindex="-1">
            <div class="game-header">
                <div class="player-info" aria-label="对手信息">
                    <span id="opponentName" aria-label="对手名称">等待对手加入...</span>
                    <span class="color-indicator black" aria-hidden="true"></span>
                </div>
                <div class="game-status">
                    <span id="turnIndicator" aria-live="polite" aria-atomic="true">等待开始</span>
                    <div class="room-id-box hidden" id="roomIdBox">
                        <small>房间 ID (点击复制)</small>
                        <code id="roomIdDisplay" role="button" tabindex="0" aria-label="点击复制房间 ID"></code>
                    </div>
                    <button id="leaveRoomBtn" aria-label="离开当前房间" type="button">离开</button>
                </div>
                <div class="player-info" aria-label="我的信息">
                    <span id="myName" aria-label="我的名称">我</span>
                    <span class="color-indicator red" aria-hidden="true" id="myColorIndicator"></span>
                </div>
            </div>
            <div class="board-container">
                <div id="chessBoard" role="grid" aria-label="中国象棋棋盘" tabindex="0"></div>
            </div>
            <div id="gameMessage" class="game-message hidden" role="alert" aria-live="assertive"></div>
        </div>
    </div>

    <script type="module" defer src="/game.js"></script>
</body>
</html>
