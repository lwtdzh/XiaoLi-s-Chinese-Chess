<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="在线中国象棋游戏 - 支持实时对战，随时随地享受经典棋艺">
    <title>中国象棋在线</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app" role="application" aria-label="中国象棋游戏">
        <!-- Lobby Screen -->
        <div id="lobby" class="screen" role="region" aria-label="游戏大厅">
            <h1>🀄 中国象棋</h1>
            <div class="lobby-container">
                <div class="room-section">
                    <h2>创建房间</h2>
                    <input type="text" id="roomName" placeholder="房间名称" maxlength="100" aria-label="房间名称" aria-required="true">
                    <button id="createRoomBtn" aria-label="创建新房间">创建房间</button>
                </div>
                <div class="room-section">
                    <h2>加入房间</h2>
                    <input type="text" id="joinRoomId" placeholder="房间 ID 或名称" aria-label="房间 ID 或名称" aria-required="true">
                    <button id="joinRoomBtn" aria-label="加入指定房间">加入房间</button>
                </div>
                <div id="lobbyMessage" class="lobby-message hidden" role="alert" aria-live="polite"></div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game" class="screen hidden" role="region" aria-label="游戏棋盘">
            <div class="game-header">
                <div class="player-info">
                    <span id="opponentName" aria-label="对手名称">等待对手加入...</span>
                    <span class="color-indicator black" aria-hidden="true"></span>
                </div>
                <div class="game-status">
                    <span id="turnIndicator" aria-live="polite" aria-atomic="true">你的回合</span>
                    <div class="room-id-box hidden">
                        <small>房间 ID:</small>
                        <code id="roomIdDisplay" role="button" tabindex="0" aria-label="点击复制房间 ID"></code>
                    </div>
                    <button id="leaveRoomBtn" aria-label="离开当前房间">离开</button>
                </div>
                <div class="player-info">
                    <span id="myName" aria-label="我的名称">我</span>
                    <span class="color-indicator red" aria-hidden="true"></span>
                </div>
            </div>
            <div class="board-container">
                <div id="chessBoard" role="grid" aria-label="中国象棋棋盘" tabindex="0"></div>
            </div>
            <div id="gameMessage" class="game-message hidden" role="alert" aria-live="assertive"></div>
        </div>
    </div>

    <script type="module" defer src="/game.js"></script>
</body>
</html>
